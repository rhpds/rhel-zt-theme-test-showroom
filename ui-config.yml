---
type: zero-touch

# Split view: 35% lab guide left, 65% Terminal right
default_width: 35
persist_url_state: true
view_switcher:
  enabled: true
  default_mode: split

antora:
  name: modules
  dir: www
  modules:
    - name: index
      label: "Welcome"
    - name: module-01
      label: "Module 1: Create a File on Node"
      scripts:
        - setup
        - validation
        - solve
      solveButton: true
    - name: module-02
      label: "Module 2: Check sshd Service"
      scripts:
        - setup
        - validation
        - solve
      solveButton: true
    - name: conclusion
      label: "Conclusion"

tabs:
  - name: Terminal (Bastion)
    url: /wetty
    type: terminal
  - name: Terminal (Node)
    url: /wetty_node
    type: terminal

skipModuleEnabled: true
