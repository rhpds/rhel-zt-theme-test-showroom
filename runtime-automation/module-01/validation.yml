---
- name: Module 1 Validation — check htop is installed on bastion
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Check htop is installed
      ansible.builtin.command: rpm -q htop
      register: r_htop
      changed_when: false
      ignore_errors: true

    - name: Validate
      validation_check:
        check: "{{ r_htop.rc == 0 }}"
        pass_msg: "Package 'htop' is installed on the bastion"
        error_msg: |
          Package 'htop' is not installed on the bastion.

          Run:
            sudo dnf install -y htop
