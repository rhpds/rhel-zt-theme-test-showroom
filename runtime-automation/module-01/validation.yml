---
- name: Module 1 Validation — check file on node
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Add node to inventory
      ansible.builtin.add_host:
        name: node
        ansible_user: lab-user
        ansible_ssh_private_key_file: /app/.ssh/id_rsa
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

- name: Validate file on node
  hosts: node
  gather_facts: false
  tasks:
    - name: Check /tmp/zt-test/done exists
      ansible.builtin.stat:
        path: /tmp/zt-test/done
      register: r_file

    - name: Validate file
      validation_check:
        check: "{{ r_file.stat.exists }}"
        pass_msg: "File /tmp/zt-test/done exists on node"
        error_msg: |
          File /tmp/zt-test/done not found on node.

          From the terminal, run:
            ssh node "mkdir -p /tmp/zt-test && touch /tmp/zt-test/done"
