---
- name: Module 1 Validation — check directory and README on node
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Add node to inventory
      ansible.builtin.add_host:
        name: node
        ansible_user: "{{ bastion_user | default('lab-user') }}"
        ansible_ssh_private_key_file: /app/.ssh/id_rsa
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

- name: Validate tasks on node
  hosts: node
  gather_facts: false
  tasks:
    - name: Check Task 1 — myproject directory exists
      ansible.builtin.stat:
        path: /home/lab-user/myproject
      register: r_dir

    - name: Check Task 2 — README.md exists
      ansible.builtin.stat:
        path: /home/lab-user/myproject/README.md
      register: r_readme

    - name: Build task summary
      ansible.builtin.set_fact:
        _task1_ok: "{{ r_dir.stat.exists and r_dir.stat.isdir }}"
        _task2_ok: "{{ r_readme.stat.exists }}"

    - name: Validate all tasks
      validation_check:
        check: "{{ _task1_ok and _task2_ok }}"
        pass_msg: |
          ✅ Task 1: Directory /home/lab-user/myproject exists on node
          ✅ Task 2: README.md exists in myproject
        error_msg: |
          {{ '✅' if _task1_ok else '❌' }} Task 1: Directory /home/lab-user/myproject exists on node
          {{ '✅' if _task2_ok else '❌' }} Task 2: README.md exists in myproject

          Missing tasks:
          {% if not _task1_ok %}  ssh node "mkdir -p /home/lab-user/myproject"
          {% endif %}{% if not _task2_ok %}  ssh node "echo '# My Project' > /home/lab-user/myproject/README.md"
          {% endif %}
