---
- name: Module 1 Setup — prepare node directory
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Add node to inventory
      ansible.builtin.add_host:
        name: node
        ansible_user: "{{ bastion_user | default('lab-user') }}"
        ansible_ssh_private_key_file: /app/.ssh/id_rsa
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

- name: Prepare node
  hosts: node
  gather_facts: false
  tasks:
    - name: Create /tmp/zt-test directory on node
      ansible.builtin.file:
        path: /tmp/zt-test
        state: directory
        mode: "0755"
      ignore_errors: true
