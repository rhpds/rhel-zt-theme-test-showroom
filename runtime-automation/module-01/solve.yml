---
- name: Module 1 Solve — create directory on node
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Add node to inventory
      ansible.builtin.add_host:
        name: node
        ansible_user: "{{ bastion_user | default('lab-user') }}"
        ansible_ssh_private_key_file: /app/.ssh/id_rsa
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

- name: Create /home/lab-user/myproject on node
  hosts: node
  gather_facts: false
  tasks:
    - name: Create myproject directory
      ansible.builtin.file:
        path: /home/lab-user/myproject
        state: directory
        mode: "0755"
