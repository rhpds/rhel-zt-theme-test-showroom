---
- name: Module 1 Solve — create file on node
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Add node to inventory
      ansible.builtin.add_host:
        name: node
        ansible_user: lab-user
        ansible_ssh_private_key_file: /app/.ssh/id_rsa
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

- name: Create file on node
  hosts: node
  gather_facts: false
  tasks:
    - name: Create /tmp/zt-test directory
      ansible.builtin.file:
        path: /tmp/zt-test
        state: directory
        mode: "0755"

    - name: Create /tmp/zt-test/done
      ansible.builtin.file:
        path: /tmp/zt-test/done
        state: touch
        mode: "0644"
