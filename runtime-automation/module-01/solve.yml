---
- name: Create required file on node
  ansible.builtin.command:
    cmd: "ssh -o StrictHostKeyChecking=no {{ node_user }}@{{ node_host }} 'mkdir -p /tmp/zt-test && touch /tmp/zt-test/done'"
  changed_when: true

- name: Solve complete
  ansible.builtin.debug:
    msg: "Module 1 solved — /tmp/zt-test/done created on {{ node_host }}"
