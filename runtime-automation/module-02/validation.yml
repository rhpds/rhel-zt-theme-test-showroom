---
- name: Module 2 Validation — check sshd on node
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Add node to inventory
      ansible.builtin.add_host:
        name: node
        ansible_user: "{{ bastion_user | default('lab-user') }}"
        ansible_ssh_private_key_file: /app/.ssh/id_rsa
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

- name: Validate sshd on node
  hosts: node
  gather_facts: false
  become: true
  tasks:
    - name: Get sshd status
      ansible.builtin.systemd:
        name: sshd
      register: r_sshd

    - name: Validate sshd
      validation_check:
        check: "{{ r_sshd.status.ActiveState == 'active' }}"
        pass_msg: "sshd is active on node"
        error_msg: |
          sshd is not active on node (state: {{ r_sshd.status.ActiveState | default('unknown') }}).

          From the terminal, run:
            ssh node "sudo systemctl enable --now sshd"
