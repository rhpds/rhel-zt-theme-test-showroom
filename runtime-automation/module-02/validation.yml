---
- name: Module 2 Validation — check sshd active on node
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Add bastion
      ansible.builtin.add_host:
        name: bastion
        ansible_host: "{{ lookup('env', 'BASTION_HOST') }}"
        ansible_port: "{{ lookup('env', 'BASTION_PORT') | default('22') }}"
        ansible_user: "{{ lookup('env', 'ANSIBLE_USER') | default('lab-user') }}"
        ansible_password: "{{ lookup('env', 'ANSIBLE_PASSWORD') }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no"

- name: Validate sshd on node
  hosts: bastion
  gather_facts: false
  vars:
    job_info_dir: "{{ lookup('env', 'JOB_INFO_DIR') | default('/tmp') }}"
  tasks:
    - name: Check sshd active
      ansible.builtin.command:
        cmd: "ssh -o StrictHostKeyChecking=no lab-user@node 'systemctl is-active sshd'"
      register: r_sshd
      changed_when: false
      failed_when: false

    - name: Fail if sshd not active
      when: r_sshd.stdout | trim != 'active'
      lab_check_fail:
        msg: |
          sshd is not active on node (status: {{ r_sshd.stdout | default('unknown') }}).

          Start it from bastion:
            ssh lab-user@node "sudo systemctl enable --now sshd"
