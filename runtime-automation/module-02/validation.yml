---
- name: Module 2 Validation — check nc on node
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Add node to inventory
      ansible.builtin.add_host:
        name: node
        ansible_user: "{{ bastion_user | default('lab-user') }}"
        ansible_ssh_private_key_file: /app/.ssh/id_rsa
        ansible_ssh_common_args: "-F /app/.ssh/config"

- name: Validate nc on node
  hosts: node
  gather_facts: false
  tasks:
    - name: Check nc is installed
      ansible.builtin.command: rpm -q nc
      register: r_nc
      changed_when: false
      ignore_errors: true

    - name: Validate
      validation_check:
        check: "{{ r_nc.rc == 0 }}"
        pass_msg: "Package nc is installed on node"
        error_msg: |
          Package nc is not installed on node.

          Run:
            ssh node "sudo dnf install -y nc"
