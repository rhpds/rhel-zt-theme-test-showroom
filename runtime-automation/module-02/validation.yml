---
- name: Module 2 Validation — check sshd active on node
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Add node to inventory
      ansible.builtin.add_host:
        name: node
        ansible_user: lab-user
        ansible_ssh_private_key_file: /app/.ssh/id_rsa
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

- name: Validate sshd on node
  hosts: node
  gather_facts: false
  become: true
  vars:
    job_info_dir: "{{ lookup('env', 'JOB_INFO_DIR') | default('/tmp') }}"
  tasks:
    - name: Check sshd is active
      ansible.builtin.systemd:
        name: sshd
      register: r_sshd

    - name: Fail if sshd not active
      when: r_sshd.status.ActiveState != 'active'
      lab_check_fail:
        msg: |
          sshd is not active on node (state: {{ r_sshd.status.ActiveState | default('unknown') }}).

          From the terminal, run:
            ssh node "sudo systemctl enable --now sshd"
