---
# Entry point for zerotouch-automation runner (RHEL/SSH mode)
# SSHes to BASTION_HOST, then playbooks connect to nodes from there.
# Vars injected by runner: module_dir, module_stage, job_info_dir

- name: Build inventory from env vars
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Add bastion to inventory
      ansible.builtin.add_host:
        name: "{{ lookup('env', 'BASTION_HOST') }}"
        ansible_host: "{{ lookup('env', 'BASTION_HOST') }}"
        ansible_port: "{{ lookup('env', 'BASTION_PORT') | default('22') }}"
        ansible_user: "{{ lookup('env', 'ANSIBLE_USER') | default('lab-user') }}"
        ansible_password: "{{ lookup('env', 'ANSIBLE_PASSWORD') }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

- name: Run module stage on bastion
  hosts: all:!localhost
  gather_facts: false
  vars:
    node_host: "node"
    node_user: "{{ ansible_user }}"
    node_password: "{{ ansible_password }}"

  tasks:
    - name: "Run {{ module_stage }} for {{ module_dir }}"
      ansible.builtin.include_tasks: "{{ module_dir }}/{{ module_stage }}.yml"
